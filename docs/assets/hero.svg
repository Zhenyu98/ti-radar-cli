<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-label="ti-radar-cli evidence workflow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1280" height="520" rx="32" fill="url(#bg)"/>
  <text x="80" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#f8fafc">Evidence-first TI mmWave capture</text>
  <text x="80" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#cbd5e1">A small CLI surface for profiles, devices, DCA1000 packet verdicts, and agent-safe operation.</text>

  <g transform="translate(70 190)" filter="url(#shadow)">
    <rect width="210" height="126" rx="18" fill="#e0f2fe"/>
    <text x="24" y="44" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Profile</text>
    <text x="24" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#334155">validate timing</text>
    <text x="24" y="103" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#334155">explain route</text>
  </g>
  <g transform="translate(320 190)" filter="url(#shadow)">
    <rect width="210" height="126" rx="18" fill="#dcfce7"/>
    <text x="24" y="44" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Device</text>
    <text x="24" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#334155">identify safely</text>
    <text x="24" y="103" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#334155">label evidence</text>
  </g>
  <g transform="translate(570 190)" filter="url(#shadow)">
    <rect width="210" height="126" rx="18" fill="#fef9c3"/>
    <text x="24" y="44" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">DCA1000</text>
    <text x="24" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#334155">record packet log</text>
    <text x="24" y="103" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#334155">check counters</text>
  </g>
  <g transform="translate(820 190)" filter="url(#shadow)">
    <rect width="210" height="126" rx="18" fill="#fee2e2"/>
    <text x="24" y="44" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Session</text>
    <text x="24" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#334155">write manifest</text>
    <text x="24" y="103" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#334155">return verdict</text>
  </g>
  <g transform="translate(1070 190)" filter="url(#shadow)">
    <rect width="140" height="126" rx="18" fill="#f8fafc"/>
    <text x="26" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#16a34a">PASS</text>
    <text x="26" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">or reasoned</text>
    <text x="26" y="106" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">failure</text>
  </g>

  <path d="M285 253h30" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  <path d="M535 253h30" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  <path d="M785 253h30" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  <path d="M1035 253h30" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>

  <rect x="80" y="380" width="1120" height="64" rx="16" fill="#020617" opacity="0.64"/>
  <text x="108" y="421" font-family="Consolas, Menlo, monospace" font-size="22" fill="#e2e8f0">ti-radar doctor -> capture smoke -> studio identify -> short capture -> session inspect</text>
</svg>
